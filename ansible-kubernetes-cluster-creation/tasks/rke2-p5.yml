- name: Configure RKE2-Calico-Crd
  run_once: true
  delegate_to: localhost
  when:
    - primarycni == "calico"
    - kubeconfig.stat.exists
  kubernetes.core.k8s:
    kubeconfig: "{{ home }}/.kube/config"
    api_version: helm.cattle.io/v1
    kind: HelmChartConfig
    name: rke2-calico-crd
    namespace: kube-system
    state: present
    definition:
      spec:
        valuesContent: |-
          global:
            systemDefaultIngressClass: traefik
- name: Configure RKE2-Calico
  run_once: true
  delegate_to: localhost
  when:
    - primarycni == "calico"
    - kubeconfig.stat.exists
  kubernetes.core.k8s:
    kubeconfig: "{{ home }}/.kube/config"
    api_version: helm.cattle.io/v1
    kind: HelmChartConfig
    name: rke2-calico
    namespace: kube-system
    state: present
    definition:
      spec:
        valuesContent: |-
          priorityClassName: system-cluster-critical
          felixConfiguration:
            defaultEndpointToHostAction: "ACCEPT"
            featureDetectOverride: "ChecksumOffloadBroken=true"
            wireguardEnabled: true
          apiServer:
            enabled: true
            xdpEnabled: false
            healthEnabled: false
          global:
            clusterCIDRv4: "{{ cluster_cidr }}"
            # clusterCIDRv6: "fd00:255::/56"
          ipamConfig:
            strictAffinity: false
          installation:
            enabled: true
            # nonPrivileged: "Enabled"
            natOutgoing: "Disabled"
            kubernetesProvider: "RKE2"
            controlPlaneTolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
            - key: node-role.kubernetes.io/master
              value: Exists
            - key: node-role.kubernetes.io/etcd
              operator: Exists
            controlPlaneReplicas: 2
            nodeUpdateStrategy:
              type: RollingUpdate
              rollingUpdate:
                maxUnavailable: 1
            serviceCIDRs:
            - "{{ service_cidr }}"
            # - fd00:254::/56
            calicoNetwork:
              multiInterfaceMode: "Multus"
              # linuxDataplane: "BPF"
              linuxDataplane: "Nftables"
              bgp: "Enabled"
              # mtu: 9000
              mtu: "{{ calico_mtu }}"
              nodeAddressAutodetectionV4:
                # kubernetes: NodeInternalIP
                firstFound: false
                # interface: ens18
                cidrs:
                - "{{ node_internal_cidr }}"
              nodeAddressAutodetectionV6: {}
              # nodeAddressAutodetectionV6:
              #   cidrs:
              #   - fd00:11::/64
              #   firstFound: false
              containerIPForwarding: "Enabled"
              kubeProxyManagement: "Enabled"
- name: Wait for Calico pods to become ready
  delegate_to: localhost
  run_once: true
  when: kubeconfig.stat.exists
  kubernetes.core.k8s_info:
    kubeconfig: "{{ home }}/.kube/config"
    kind: Pod
    namespace: calico-system
    wait: true
    wait_condition:
      type: "Ready"
      status: "True"
    wait_sleep: 10
    wait_timeout: 300
  changed_when: false
- name: Configure RKE2-Cilium
  run_once: true
  delegate_to: localhost
  when:
    - primarycni == "cilium"
    - kubeconfig.stat.exists
  kubernetes.core.k8s:
    kubeconfig: "{{ home }}/.kube/config"
    api_version: helm.cattle.io/v1
    kind: HelmChartConfig
    name: rke2-cilium
    namespace: kube-system
    state: present
    definition:
      spec:
        valuesContent: |-
          autoDirectNodeRoutes: true
          kubeProxyReplacement: true
          k8sServiceHost: "localhost"
          k8sServicePort: 6443
          priorityClassName: system-cluster-critical
          bgpControlPlane:
            enabled: true
          pmtuDiscovery:
            enabled: true
          cni:
            chainingMode: "portmap"
            enableRouteMTUForCNIChaining: true
            iptablesRemoveAWSRules: false
          ciliumEndpointSlice:
            enabled: true
          encryption:
            enabled: true
            type: wireguard
          nodeIPAM:
            enabled: true
          ipam:
            operator:
              clusterPoolIPv4PodCIDRList: ["{{ cluster_cidr }}"]
              clusterPoolIPv4MaskSize: 24
              clusterPoolIPv6PodCIDRList: ["fd00:255::/104"]
              clusterPoolIPv6MaskSize: 120
          ipv4:
            enabled: true
          ipv6:
            enabled: false
          k8s:
            requireIPv4PodCIDR: true
            requireIPv6PodCIDR: false
          l2NeighDiscovery:
            enabled: true
          enableIPv4BIGTCP: true
          enableIPv6BIGTCP: false
          ipv4NativeRoutingCIDR: "{{ node_internal_cidr }}"
          MTU: "{{ calico_mtu }}"
          hubble:
            enabled: false
            relay:
              enabled: false
            ui:
              enabled: false
- name: Configure RKE2-Multus
  run_once: true
  delegate_to: localhost
  when: kubeconfig.stat.exists
  kubernetes.core.k8s:
    kubeconfig: "{{ home }}/.kube/config"
    api_version: helm.cattle.io/v1
    kind: HelmChartConfig
    name: rke2-multus
    namespace: kube-system
    state: present
    definition:
      spec:
        valuesContent: |-
          rke2-whereabouts:
            enabled: false
          pod:
            resources:
              enabled: true
- name: Configure Coredns
  run_once: true
  delegate_to: localhost
  kubernetes.core.k8s:
    kubeconfig: "{{ home }}/.kube/config"
    api_version: helm.cattle.io/v1
    kind: HelmChartConfig
    name: rke2-coredns
    namespace: kube-system
    state: present
    definition:
      spec:
        valuesContent: |-
          global:
            clusterDNS:
            - "{{ kube_dns }}"
          nodelocal:
            enabled: true
            ipvs: true
          service:
            # clusterIP: 10.254.0.10
            # loadBalancerIP: 10.0.100.2
            # externalTrafficPolicy: Local
            serviceType: ClusterIP
            annotations:
              metallb.io/allow-shared-ip: coredns
          rbac:
            create: true
          prometheus:
            service:
              enabled: false
              annotations:
                prometheus.io/scrape: "true"
                prometheus.io/port: "9153"
            monitor:
              enabled: false
          replicaCount: 3
          autoscaler:
            enabled: false
            # min: 2
            # max: 5
          servers:
          - zones:
            - zone: .
            port: 53
            plugins:
            - name: errors
            # Serves a /health endpoint on :8080, required for livenessProbe
            - name: health
              configBlock: |-
                lameduck 5s
            # Serves a /ready endpoint on :8181, required for readinessProbe
            - name: ready
            # Required to query kubernetes API for data
            - name: kubernetes
              parameters: cluster.local in-addr.arpa ip6.arpa homelab.heyser.xyz
              configBlock: |-
                pods insecure
                fallthrough in-addr.arpa ip6.arpa homelab.heyser.xyz
                ttl 30
            - name: prometheus
              parameters: 0.0.0.0:9153
            - name: forward
              # parameters: . 10.0.0.1 /etc/resolv.conf
              parameters: . 10.0.0.1
              configBlock: |-
                except "cluster.local" "svc.cluster.local" ".svc"
                policy sequential
                max_concurrent 1000
            - name: cache
              parameters: 30
            - name: loop
            - name: reload
            - name: loadbalance
          zoneFiles:
          - filename: heyser.xyz
            domain: heyser.xyz
            contents: |
              heyser.xyz.   IN SOA  kyrie.ns.cloudflare.com. dns.cloudflare.com. 2325026458 10000 2400 604800 1800
              heyser.xyz. IN A   10.0.100.1
              homelab.heyser.xyz. IN A   10.0.100.1
              *.homelab.heyser.xyz. IN A   10.0.100.1
