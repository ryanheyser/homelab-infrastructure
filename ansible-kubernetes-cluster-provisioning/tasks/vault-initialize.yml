- name: Unseal Vault 1 - vault-0
  when: >-
    vault_status_vault_0.stdout is defined and (vault_status_vault_0.stdout | from_json).sealed and kubeconfig.stat.exists
  kubernetes.core.k8s_exec:
    kubeconfig: "{{ home }}/.kube/config"
    namespace: vault-system
    pod: vault-0
    command: "vault operator unseal -format=json {{ unseal_keys_b64_0.stdout }}"
