    command: sh -c "vault kv put -mount=secret tailscale-client-credentials client-id={{ (vaultinitial).network_system_tailscale_tailscaleClientCredentials_client_id }} client-secret={{ (vaultinitial).network_system_tailscale_tailscaleClientCredentials_client_secret }}"
  when: >-
    kubeconfig.stat.exists and vaultinitialsecretstoreinit is success
